name: CI + CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Super-linter
        uses: github/super-linter@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run jscpd
        run: npx jscpd . --threshold 10

      - name: Run Stylelint
        run: npx stylelint "**/*.css" || true

  delivery:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Gerar artefato (zip)
        uses: actions/upload-artifact@v4
        with:
          name: projeto-zipado
          path: |
            index.html
            style.css
            script.js
            responsive.css

  deploy:
    runs-on: ubuntu-latest
    needs: delivery

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: projeto-zipado

      - name: Ver arquivos
        run: ls -R