name: Continuous Delivery
on:
  push:
  branches:
    - main

permissions:
  contents: read

jobs:
  delivery:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout out repository code
        uses: actions/upload-artifact@v4

      - name: Simulando Continuous Delivery
        uses: actions/upload-artifact@v4
        with:
          name: projeto-zipado.zip
          path:
            index.html
            style.css
            script.js
            responsive.css