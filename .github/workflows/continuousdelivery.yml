name: Continuous Delivery + Deploy

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Gerar artefato (zip)
        uses: actions/upload-artifact@v4
        with:
          name: projeto-zipado
          path: |
            index.html
            style.css
            script.js
            responsive.css

  deploy:
    runs-on: ubuntu-latest
    needs: delivery
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: projeto-zipado
      - name: Display structure of the downloaded artifact
        run: ls -R
        
   
