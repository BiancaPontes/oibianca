---

name: CI + CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read
  statuses: write

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Super-linter
        uses: github/super-linter@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
   
  test:
    runs-on: ubuntu-latest
    needs: lint

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - uses: actions/checkout@v4

      - name: Usar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Instalar dependências
        run: npm ci

      - name: Rodar testes
        run: npm test

  deliver:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Gerar artefato
        uses: actions/upload-artifact@v4
        with:
          name: projeto-zipado
          path: |
            index.html
            style.css
            script.js
            responsive.css

  deploy:
    runs-on: ubuntu-latest
    needs: deliver

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: projeto-zipado

      - run: ls -R

  docker:
    runs-on: ubuntu-latest
    needs: deliver

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build -t oibianca .

  discord:
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - uses: actions/checkout@v4

      - name: Run Discord Webhook
        uses: Sniddl/discord-commits@v1.6
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          template: "avatar-with-link"
          include-externas: true
